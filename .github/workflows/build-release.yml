# ============================================================
# VideoLingo Q - 离线打包与发布工作流 (DMG & EXE)
# ============================================================
name: 构建离线安装包 (Build & Release)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ============================================================
  # macOS 构建 (ARM64 + x64) - 生成 DMG
  # ============================================================
  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: arm64
            arch_label: macOS-arm64
            python_url: "https://github.com/indygreg/python-build-standalone/releases/download/20240107/cpython-3.10.13+20240107-aarch64-apple-darwin-install_only.tar.gz"
          - runner: macos-14
            arch: x64
            arch_label: macOS-x64
            python_url: "https://github.com/indygreg/python-build-standalone/releases/download/20240107/cpython-3.10.13+20240107-x86_64-apple-darwin-install_only.tar.gz"

    runs-on: ${{ matrix.runner }}
    name: 构建 ${{ matrix.arch_label }} (DMG)

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 配置 Portable Python 环境
        run: |
          mkdir -p runtime
          echo "下载 Portable Python..."
          curl -sL -o python.tar.gz "${{ matrix.python_url }}"
          tar -xzf python.tar.gz
          mv python runtime/python
          echo "✅ Python 环境已解压: $(./runtime/python/bin/python3 -V)"

      - name: 📦 安装所有 Python 依赖 (完全离线化)
        run: |
          ./runtime/python/bin/python3 -m pip install --upgrade pip
          ./runtime/python/bin/python3 -m pip install -r requirements.txt
          echo "✅ 依赖安装完成"

      - name: 📦 获取 FFmpeg 静态二进制
        run: |
          mkdir -p runtime/ffmpeg
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            brew install ffmpeg 2>/dev/null || true
            cp $(which ffmpeg) runtime/ffmpeg/ffmpeg
            cp $(which ffprobe) runtime/ffmpeg/ffprobe
            chmod +x runtime/ffmpeg/ffmpeg runtime/ffmpeg/ffprobe
          else
            curl -sL -o ffmpeg.zip "https://evermeet.cx/ffmpeg/getrelease/zip"
            curl -sL -o ffprobe.zip "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip"
            unzip -q ffmpeg.zip -d runtime/ffmpeg/
            unzip -q ffprobe.zip -d runtime/ffmpeg/
            chmod +x runtime/ffmpeg/ffmpeg runtime/ffmpeg/ffprobe
          fi
          echo "✅ FFmpeg 已下载"

      - name: 📋 准备 Mac App Bundle 结构
        run: |
          APP_NAME="VideoLingo Q"
          APP_DIR="${APP_NAME}.app"
          
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources/app"
          
          # 创建 Info.plist
          cat > "$APP_DIR/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Launcher</string>
              <key>CFBundleIdentifier</key>
              <string>com.qxk2005.videolingo</string>
              <key>CFBundleName</key>
              <string>$APP_NAME</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
          </dict>
          </plist>
          EOF
          
          # 创建启动器
          cat > "$APP_DIR/Contents/MacOS/Launcher" << 'EOF'
          #!/bin/bash
          DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"
          cd "$DIR/../Resources/app"
          
          # 唤起终端运行，方便查看日志
          osascript -e "tell application \"Terminal\" to do script \"cd \\\"$DIR/../Resources/app\\\" && ./start_macos.command\""
          EOF
          chmod +x "$APP_DIR/Contents/MacOS/Launcher"

          # 拷贝应用文件
          rsync -a \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='VideoLingo Q.app' \
            --exclude='python.tar.gz' \
            --exclude='ffmpeg.zip' \
            --exclude='ffprobe.zip' \
            . "$APP_DIR/Contents/Resources/app/"
            
          chmod +x "$APP_DIR/Contents/Resources/app/start_macos.command"
          
      - name: 📦 打包成 DMG
        run: |
          # 借助 hdiutil 直接生成 DMG
          hdiutil create -volname "VideoLingo Q" -srcfolder "VideoLingo Q.app" -ov -format UDZO "VideoLingo-Q-${{ matrix.arch_label }}.dmg"

      - name: 📤 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: VideoLingo-Q-${{ matrix.arch_label }}-DMG
          path: VideoLingo-Q-${{ matrix.arch_label }}.dmg
          retention-days: 7


  # ============================================================
  # Windows 构建 (x64) - 生成 EXE
  # ============================================================
  build-windows:
    runs-on: windows-latest
    name: 构建 Windows-x64 (EXE)

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 配置 Windows Embeddable Python
        shell: pwsh
        run: |
          $pythonUrl = "https://www.python.org/ftp/python/3.10.11/python-3.10.11-embed-amd64.zip"
          New-Item -ItemType Directory -Force -Path "runtime\python"
          Invoke-WebRequest -Uri $pythonUrl -OutFile "python.zip"
          Expand-Archive -Path "python.zip" -DestinationPath "runtime\python"
          
          # 解除 site-packages 限制
          $pthPath = "runtime\python\python310._pth"
          $content = Get-Content $pthPath
          $content = $content -replace '#import site', 'import site'
          Set-Content -Path $pthPath -Value $content

          # 安装 pip
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "get-pip.py"
          runtime\python\python.exe get-pip.py
          Write-Host "✅ Python Embedded 环境已准备就绪"

      - name: 📦 安装所有 Python 依赖
        shell: pwsh
        run: |
          # 显式使用嵌入式环境的 pip
          runtime\python\python.exe -m pip install --upgrade pip
          runtime\python\python.exe -m pip install -r requirements.txt
          # 针对 Windows 用户显式安装 PyTorch CUDA 11.8 版以提供 GPU 支持
          runtime\python\python.exe -m pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu118
          Write-Host "✅ 依赖安装完成"

      - name: 📦 获取 FFmpeg 静态二进制 (Windows)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "runtime\ffmpeg"
          # 使用 BtbN 静态构建版
          $ffmpegUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_temp"
          
          # BtbN 压缩包内有个 ffmpeg-master-latest-win64-gpl 文件夹，取出 bin 里的文件
          $binPath = Get-ChildItem -Path "ffmpeg_temp" -Directory | Select-Object -First 1
          Copy-Item -Path "$($binPath.FullName)\bin\*" -Destination "runtime\ffmpeg\" -Force
          Write-Host "✅ FFmpeg (Windows) 已准备"

      - name: 📋 准备发布文件存放区
        shell: pwsh
        run: |
          $releaseDir = "VideoLingo-Q-Windows-x64"
          $excludeDirs = @('.git', '__pycache__', 'output', 'history', '_model_cache', 'VideoLingo.egg-info', 'build', 'dist', 'ffmpeg_temp')
          
          robocopy . $releaseDir /E `
            /XD $excludeDirs `
            /XF python.zip get-pip.py ffmpeg.zip `
            /NFL /NDL /NJH /NJS 2>&1 | Out-Null
            
          if ($LASTEXITCODE -lt 8) { $global:LASTEXITCODE = 0 }

      - name: 📦 使用 Inno Setup 编译 EXE
        shell: pwsh
        run: |
          # 确保 Inno Setup 可用
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $iscc) {
            & $iscc "installer_windows.iss"
          } else {
            Write-Host "❌ 找不到 Inno Setup"
            exit 1
          }

      - name: 📤 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: VideoLingo-Q-Windows-x64-EXE
          path: output/VideoLingo-Q-Setup.exe
          retention-days: 7


  # ============================================================
  # 创建 GitHub Release 并附加安装包
  # ============================================================
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: release_assets
          merge-multiple: true

      - name: 🚀 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
