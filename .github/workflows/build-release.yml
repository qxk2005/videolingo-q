# ============================================================
# VideoLingo Q - 离线打包与发布工作流 (DMG & EXE)
# ============================================================
name: 构建离线安装包 (Build & Release)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ============================================================
  # macOS 构建 (ARM64) - 生成 DMG
  # ============================================================
  build-macos:
    runs-on: macos-14
    name: 构建 macOS-arm64 (DMG)

    env:
      PYTHON_URL: "https://github.com/indygreg/python-build-standalone/releases/download/20240107/cpython-3.10.13+20240107-aarch64-apple-darwin-install_only.tar.gz"

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 配置 Portable Python 环境
        run: |
          mkdir -p runtime
          echo "下载 Portable Python..."
          curl -fSL -o python.tar.gz "${{ env.PYTHON_URL }}"
          tar -xzf python.tar.gz
          mv python runtime/python
          ./runtime/python/bin/python3 --version
          echo "✅ Python 环境已解压"

      - name: 📦 安装所有 Python 依赖
        run: |
          PIP="./runtime/python/bin/python3 -m pip"

          $PIP install --upgrade pip setuptools wheel

          # 1. 先安装 PyTorch CPU 版 (macOS 不支持 CUDA)
          $PIP install torch torchvision torchaudio

          # 2. 安装主 requirements (过滤掉 git+ 依赖，单独处理)
          grep -v 'git+' requirements.txt > requirements_no_git.txt
          $PIP install -r requirements_no_git.txt

          # 3. 单独安装 git 依赖 (允许失败)
          $PIP install "demucs[dev] @ git+https://github.com/adefossez/demucs" || echo "⚠️ demucs 安装失败，跳过"
          $PIP install "whisperx @ git+https://github.com/m-bain/whisperx.git@7307306a9d8dd0d261e588cc933322454f853853" || echo "⚠️ whisperx 安装失败，跳过"

          echo "✅ 依赖安装完成"

      - name: 📦 获取 FFmpeg 静态二进制
        run: |
          mkdir -p runtime/ffmpeg
          brew install ffmpeg 2>/dev/null || true
          cp "$(which ffmpeg)" runtime/ffmpeg/ffmpeg
          cp "$(which ffprobe)" runtime/ffmpeg/ffprobe
          chmod +x runtime/ffmpeg/ffmpeg runtime/ffmpeg/ffprobe
          echo "✅ FFmpeg 已准备"

      - name: 📋 准备 Mac App Bundle
        run: |
          APP_DIR="VideoLingo Q.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources/app"

          # 从仓库中的模板文件拷贝 Info.plist 和 Launcher
          cp packaging/macos/Info.plist "$APP_DIR/Contents/Info.plist"
          cp packaging/macos/Launcher "$APP_DIR/Contents/MacOS/Launcher"
          chmod +x "$APP_DIR/Contents/MacOS/Launcher"

          # 拷贝应用文件到 app bundle
          rsync -a \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.DS_Store' \
            --exclude='VideoLingo Q.app' \
            --exclude='python.tar.gz' \
            --exclude='ffmpeg.zip' \
            --exclude='ffprobe.zip' \
            --exclude='requirements_no_git.txt' \
            --exclude='output/' \
            --exclude='history/' \
            --exclude='_model_cache/' \
            --exclude='*.egg-info' \
            --exclude='build/' \
            --exclude='dist/' \
            --exclude='config.yaml' \
            --exclude='llm_profiles.json' \
            --exclude='*.log' \
            . "$APP_DIR/Contents/Resources/app/"

          chmod +x "$APP_DIR/Contents/Resources/app/start_macos.command"

          echo "✅ App Bundle 准备完成"
          echo "文件数量: $(find "$APP_DIR" -type f | wc -l | tr -d ' ')"
          du -sh "$APP_DIR"

      - name: 📦 打包成 DMG
        run: |
          hdiutil create \
            -volname "VideoLingo Q" \
            -srcfolder "VideoLingo Q.app" \
            -ov \
            -format UDZO \
            "VideoLingo-Q-macOS-arm64.dmg"
          echo "✅ DMG 打包完成"
          ls -lh "VideoLingo-Q-macOS-arm64.dmg"

      - name: 📤 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: VideoLingo-Q-macOS-arm64-DMG
          path: VideoLingo-Q-macOS-arm64.dmg
          retention-days: 7


  # ============================================================
  # Windows 构建 (x64) - 生成 EXE
  # ============================================================
  build-windows:
    runs-on: windows-latest
    name: 构建 Windows-x64 (EXE)

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 配置 Windows Embeddable Python
        shell: pwsh
        run: |
          $pythonUrl = "https://www.python.org/ftp/python/3.10.11/python-3.10.11-embed-amd64.zip"
          New-Item -ItemType Directory -Force -Path "runtime\python"
          Invoke-WebRequest -Uri $pythonUrl -OutFile "python.zip"
          Expand-Archive -Path "python.zip" -DestinationPath "runtime\python"

          $pthPath = "runtime\python\python310._pth"
          $content = Get-Content $pthPath
          $content = $content -replace '#import site', 'import site'
          Set-Content -Path $pthPath -Value $content

          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "get-pip.py"
          runtime\python\python.exe get-pip.py
          Write-Host "✅ Python Embedded 环境已准备就绪"

      - name: 📦 安装所有 Python 依赖
        shell: pwsh
        run: |
          $py = "runtime\python\python.exe"

          & $py -m pip install --upgrade pip setuptools wheel

          # 1. 安装 PyTorch CUDA 版
          & $py -m pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu118

          # 2. 安装主 requirements (过滤 git 依赖)
          Get-Content requirements.txt | Where-Object { $_ -notmatch 'git\+' } | Set-Content requirements_no_git.txt
          & $py -m pip install -r requirements_no_git.txt

          # 3. 单独安装 git 依赖
          & $py -m pip install "demucs[dev] @ git+https://github.com/adefossez/demucs"
          if ($LASTEXITCODE -ne 0) { Write-Host "⚠️ demucs 安装失败，跳过" }
          & $py -m pip install "whisperx @ git+https://github.com/m-bain/whisperx.git@7307306a9d8dd0d261e588cc933322454f853853"
          if ($LASTEXITCODE -ne 0) { Write-Host "⚠️ whisperx 安装失败，跳过" }

          $global:LASTEXITCODE = 0
          Write-Host "✅ 依赖安装完成"

      - name: 📦 获取 FFmpeg 静态二进制 (Windows)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "runtime\ffmpeg"
          $ffmpegUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_temp"

          $binPath = Get-ChildItem -Path "ffmpeg_temp" -Directory | Select-Object -First 1
          Copy-Item -Path "$($binPath.FullName)\bin\*" -Destination "runtime\ffmpeg\" -Force
          Write-Host "✅ FFmpeg (Windows) 已准备"

      - name: 📋 准备发布文件
        shell: pwsh
        run: |
          $releaseDir = "VideoLingo-Q-Windows-x64"
          $excludeDirs = @('.git', '__pycache__', 'output', 'history', '_model_cache',
                          'VideoLingo.egg-info', 'build', 'dist', 'ffmpeg_temp')

          robocopy . $releaseDir /E `
            /XD $excludeDirs `
            /XF python.zip get-pip.py ffmpeg.zip requirements_no_git.txt `
            /NFL /NDL /NJH /NJS 2>&1 | Out-Null

          if ($LASTEXITCODE -lt 8) { $global:LASTEXITCODE = 0 }
          Write-Host "✅ 发布文件准备完成"

      - name: 📦 使用 Inno Setup 编译 EXE
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (Test-Path $iscc) {
            & $iscc "installer_windows.iss"
            Write-Host "✅ EXE 安装包编译完成"
          } else {
            Write-Host "❌ 找不到 Inno Setup"
            exit 1
          }

      - name: 📤 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: VideoLingo-Q-Windows-x64-EXE
          path: output/VideoLingo-Q-Setup.exe
          retention-days: 7


  # ============================================================
  # 创建 GitHub Release
  # ============================================================
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: release_assets
          merge-multiple: true

      - name: 📋 列出产物
        run: ls -lhR release_assets/

      - name: 🚀 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release_assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
