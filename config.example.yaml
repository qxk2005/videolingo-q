# * Settings marked with * are advanced settings that won't appear in the Streamlit page and can only be modified manually in config.py
# recommend to set in streamlit page
# -------------------
# version: "3.0.0"
# author: "Huanshere"
# -------------------

## ======================== Basic Settings ======================== ##

display_language: "zh-CN"

# API settings
api:
  key: 'YOUR_API_KEY'
  base_url: 'YOUR_BASE_URL'
  model: 'YOUR_MODEL'
  llm_support_json: false
  use_antigravity_cli: true
  antigravity_token_code: ''
# *Number of LLM multi-threaded accesses, set to 1 if using local LLM
max_workers: 1

# Language settings, written into the prompt, can be described in natural language
target_language: '简体中文'

# Whether to use Demucs for vocal separation before transcription
demucs: true

whisper:
  # ["large-v3", "large-v3-turbo"]. Note: for zh model will force to use Belle/large-v3
  model: 'large-v3'
  # Whisper specified recognition language ISO 639-1
  language: 'en'
  detected_language: 'en'
  # Whisper running mode ["local", "mlx", "cloud", "elevenlabs"]. mlx = Apple Silicon accelerated (requires: pip install mlx-whisper), cloud uses 302.ai API
  runtime: 'mlx'
  # 302.ai API key
  whisperX_302_api_key: 'your_302_api_key'
  # ElevenLabs API key (experimental)
  elevenlabs_api_key: 'your_elevenlabs_api_key'

# Whether to burn subtitles into the video
burn_subtitles: true

# Automatically burn subtitles to video after processing, skipping the manual review step
auto_burn_subtitles: true

# Domain-specific vocabulary for ASR correction (comma or newline separated)
# These terms will be used to bias WhisperX transcription and correct misrecognized words
# Example: "Claude Cowork, AISTACK, VideoLingo"
domain_vocab: ""

efficiency_mode: true
# *Efficiency mode batch split size: maximum sentences sent to LLM in one batch, set to 0 for unlimited (all at once)
batch_split_size: 100
# *Efficiency mode batch translate size: maximum subtitle lines sent to LLM in one batch, set to 0 for unlimited
batch_translate_size: 15

## ======================== Advanced Settings ======================== ##
# *🔬 FFmpeg hardware video encoding acceleration. On macOS uses h264_videotoolbox (Apple Silicon/VideoToolbox), on other platforms uses h264_nvenc (NVIDIA). Set to true to enable.
ffmpeg_gpu: true

# *Youtube settings
youtube:
  cookies_path: ''

# *Default resolution for downloading YouTube videos [360, 1080, best]
ytb_resolution: '1080'

subtitle:
  # *Maximum length of each subtitle line in characters
  max_length: 75
  # *Translated subtitles are slightly larger than source subtitles, affecting the reference length for subtitle splitting
  target_multiplier: 1.2

# *Summary length, set low to 2k if using local LLM
summary_length: 8000

# *Maximum number of words for the first rough cut, below 18 will cut too finely affecting translation, above 22 is too long and will make subsequent subtitle splitting difficult to align
max_split_length: 20

# *Whether to reflect the translation result in the original text
reflect_translate: true

# *Whether to pause after extracting professional terms and before translation, allowing users to manually adjust the terminology table output\log\terminology.json
pause_before_translate: false

## ======================== Dubbing Settings ======================== ##
# TTS selection [edge_tts, doubao_tts]
tts_method: 'edge_tts'

# Number of concurrent TTS tasks
tts_max_workers: 1

# Edge TTS configuration
edge_tts:
  voice: 'zh-CN-YunyangNeural'

# Volcengine Doubao TTS configuration
doubao_tts:
  appid: 'YOUR_APPID'
  access_token: 'YOUR_ACCESS_TOKEN'
  voice: 'zh_female_vv_uranus_bigtts'

# *Audio speed range
speed_factor:
  min: 1.0
  accept: 1.15 # Maximum acceptable speed before warning (professional dubbing standard)
  max: 1.25    # Hard cap on speed-up ratio

# *Slow down video slightly to give more breathing room for dubbed audio.
# 1.0 = no change, 0.97 = 3% slower video (barely perceptible, recommended for tight fits).
# When set below 1.0, all subtitle timestamps and the output video are scaled consistently.
video_slow_factor: 1.0

# *Merge audio configuration
min_subtitle_duration: 2.5 # Minimum subtitle duration, will be forcibly extended
min_trim_duration: 3.5 # Subtitles shorter than this value won't be split
tolerance: 1.5 # Allowed extension time to the next subtitle





## ======================== Additional settings ======================== ##

# Whisper model directory
model_dir: './_model_cache'

# Supported upload video formats
allowed_video_formats:
- 'mp4'
- 'mov'
- 'avi'
- 'mkv'
- 'flv'
- 'wmv'
- 'webm'

allowed_audio_formats:
- 'wav'
- 'mp3'
- 'flac'
- 'm4a'

# Spacy models
spacy_model_map:
  en: 'en_core_web_md'
  ru: 'ru_core_news_md'
  fr: 'fr_core_news_md'
  ja: 'ja_core_news_md'
  es: 'es_core_news_md'
  de: 'de_core_news_md'
  it: 'it_core_news_md'
  zh: 'zh_core_web_md'

# Languages that use space as separator
language_split_with_space:
- 'en'
- 'es'
- 'fr'
- 'de'
- 'it'
- 'ru'

# Languages that do not use space as separator
language_split_without_space:
- 'zh'
- 'ja'
